<div class="cats" id="cats" aria-label="{{ T "meow" }}">
  <span class="c-bubble">{{ T "meow" }}</span>

  {{/* tabby — thin & tall */}}
  <button class="kat fur-tabby s-tall" type="button" aria-label="cat">
    <span class="tail"></span><span class="body"></span><span class="bib"></span><span class="head"></span>
    <span class="ear l"></span><span class="ear r"></span>
    <span class="stripe s1"></span><span class="stripe s2"></span><span class="stripe s3"></span><span class="stripe s4"></span>
    <span class="muzzle"></span><span class="eye l"></span><span class="eye r"></span><span class="nose"></span>
  </button>

  {{/* orange-white — fat & tall */}}
  <button class="kat fur-orange s-big" type="button" aria-label="cat">
    <span class="tail"></span><span class="body"></span><span class="bib"></span><span class="head"></span>
    <span class="ear l"></span><span class="ear r"></span>
    <span class="muzzle"></span><span class="eye l"></span><span class="eye r"></span><span class="nose"></span>
  </button>

  {{/* orange-white — thin & small, short tail */}}
  <button class="kat fur-orange s-small" type="button" aria-label="cat">
    <span class="tail"></span><span class="body"></span><span class="bib"></span><span class="head"></span>
    <span class="ear l"></span><span class="ear r"></span>
    <span class="muzzle"></span><span class="eye l"></span><span class="eye r"></span><span class="nose"></span>
  </button>
</div>
