<a class="post rv" href="{{ .RelPermalink }}">
  <span class="dt">{{ .Date.Format "2006·01" }}</span>
  <span class="pt">{{ .Title }}</span>
  {{ if or (eq .Section "research") (eq .Section "projects") }}<span class="cat sec-{{ .Section }}">{{ T .Section }}</span>
  {{ else }}{{ with .Params.categories }}<span class="cat">{{ index . 0 }}</span>{{ end }}{{ end }}
</a>
